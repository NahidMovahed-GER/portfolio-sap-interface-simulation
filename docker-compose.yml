version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: sap_sim_postgres
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: sap_sim
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
      - ./data:/data
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: sap_sim_adminer
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata: